<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">TRINCA RV21 - WhatsApp Oficial</title>
  <desc id="desc">Avatar oficial do projeto TRINCA RV21 com logo RV e identidade premium em preto, dourado e verde.</desc>
  <defs>
    <radialGradient id="goldGlow" cx="50%" cy="38%" r="68%">
      <stop offset="0" stop-color="#2d250d"/>
      <stop offset="0.48" stop-color="#080806"/>
      <stop offset="1" stop-color="#030303"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f0d37a"/>
      <stop offset="0.48" stop-color="#d8b45a"/>
      <stop offset="1" stop-color="#8e6e22"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#75d8a2"/>
      <stop offset="1" stop-color="#0cb3a6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#050505"/>
  <rect width="1024" height="1024" fill="url(#goldGlow)" opacity="0.95"/>
  <circle cx="512" cy="512" r="452" fill="none" stroke="url(#gold)" stroke-width="11" opacity="0.82"/>
  <circle cx="512" cy="512" r="412" fill="none" stroke="url(#teal)" stroke-width="3" opacity="0.38"/>
  <circle cx="512" cy="508" r="325" fill="#050505" opacity="0.5"/>

  <g filter="url(#softShadow)">
    <image href="logorv.jpg" x="282" y="130" width="460" height="460" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <text x="512" y="720" text-anchor="middle" fill="#fff7e8" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="900" letter-spacing="0">TRINCA</text>
  <text x="512" y="814" text-anchor="middle" fill="url(#gold)" font-family="Arial, Helvetica, sans-serif" font-size="102" font-weight="900" letter-spacing="0">RV21</text>
  <rect x="312" y="852" width="400" height="5" rx="2.5" fill="url(#gold)" opacity="0.88"/>
  <text x="512" y="899" text-anchor="middle" fill="#cfc4b1" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="800" letter-spacing="3">PROJETO OFICIAL</text>
</svg>
